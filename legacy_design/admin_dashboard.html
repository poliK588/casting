/* ═══════════════════════════════════════════════════════════
   TALENT SERVICE — Unified DB Interface
═══════════════════════════════════════════════════════════ */
const TalentService = {
  // Initialize DB: seed if empty
  async init() {
    const count = await db.talents.count();
    if (count === 0) {
      await db.talents.bulkAdd(SEED_TALENT);
      console.log('[TalentService] Seeded DB with', SEED_TALENT.length, 'records');
    }
    return db.talents.count();
  },

  // Read all talents
  async getAll() {
    return db.talents.toArray();
  },

  // Get single talent by ID
  async getById(id) {
    return db.talents.get(id);
  },

  // Add a new talent
  async add(talent) {
    const id = await db.talents.add(talent);
    return id;
  },

  // Update an existing talent (partial)
  async update(id, changes) {
    await db.talents.update(id, changes);
  },

  // Delete a talent
  async remove(id) {
    await db.talents.delete(id);
  },

  // Bulk import (overwrite all)
  async bulkImport(jsonArray) {
    await db.talents.clear();
    await db.talents.bulkAdd(jsonArray);
    return jsonArray.length;
  },

  // Export all as JSON
  async exportAll() {
    return db.talents.toArray();
  },

  // Get total count
  async count() {
    return db.talents.count();
  }
};

  const [talent, setTalent] = useState([]);
  const [dbReady, setDbReady] = useState(false);
  const [revision, setRevision] = useState(0);

  // Force refresh
  const refresh = useCallback(() => setRevision(r => r + 1), []);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      await TalentService.init();
      if (!cancelled) {
        const all = await TalentService.getAll();
        setTalent(all);
        setDbReady(true);
      }
    })();
    return () => { cancelled = true; };
  }, [revision]);

  return { talent, dbReady, refresh };
}

const LOC_LABELS = { la:'Los Angeles', nyc:'New York', chi:'Chicago', atl:'Atlanta', aus:'Austin' };
const UNION_LABELS = { sag:'SAG-AFTRA', afm:'AFM', equity:'AEA (Equity)', nonunion:'Non-Union' };

/* ═══════════════════════════════════════════════════════════
   CONTEXT
═══════════════════════════════════════════════════════════ */
const AppContext = createContext(null);

function AppProvider({ children }) {
  const { talent, dbReady, refresh } = useLiveTalent();
  const [shortlist, setShortlist] = useState(new Set());
  const [activeNav, setActiveNav] = useState('dashboard');
  const [sidebarExpanded, setSidebarExpanded] = useState(false);
  const [viewMode, setViewMode] = useState('grid');
  const [sortBy, setSortBy] = useState('name');

  // Filter state
  const [search, setSearch] = useState('');
  const [filterAvail, setFilterAvail] = useState([]);
  const [filterGender, setFilterGender] = useState('all');
  const [filterEth, setFilterEth] = useState([]);
  const [filterSkills, setFilterSkills] = useState([]);
  const [filterUnion, setFilterUnion] = useState([]);
  const [filterLoc, setFilterLoc] = useState([]);
  const [ageMin, setAgeMin] = useState(18);
  const [ageMax, setAgeMax] = useState(65);
  const [rateMax, setRateMax] = useState(10000);

  // Modal state
  const [talentModal, setTalentModal] = useState(null);
  const [showAddTalent, setShowAddTalent] = useState(false);
  const [showNewProject, setShowNewProject] = useState(false);
  const [toast, setToast] = useState(null);

  const showToast = useCallback((msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  }, []);

  const toggleShortlist = useCallback((id) => {
    setShortlist(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  }, []);

  const addTalent = useCallback(async (t) => {
    const newTalent = { ...t, credits: 0, rating: 4.0, recentCredit: 'Newly Added', img: `https://ui-avatars.com/api/?name=${encodeURIComponent(t.name)}&background=0f172a&color=fff&size=400&bold=true` };
    await TalentService.add(newTalent);
    refresh();
    showToast(`${t.name} added to IndexedDB!`);
  }, [showToast, refresh]);

  const removeTalent = useCallback(async (id) => {
    await TalentService.remove(id);
    refresh();
    showToast('Talent removed from database');
  }, [showToast, refresh]);

  // Bulk import handler
  const bulkImport = useCallback(async (jsonArray) => {
    const count = await TalentService.bulkImport(jsonArray);
    refresh();
    showToast(`Imported ${count} records into IndexedDB!`);
    return count;
  }, [showToast, refresh]);

  // Export handler
  const exportAll = useCallback(async () => {
    const data = await TalentService.exportAll();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'castinghub_talent_export.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(`Exported ${data.length} records as JSON`);
  }, [showToast]);

  const clearFilters = useCallback(() => {
    setSearch(''); setFilterAvail([]); setFilterGender('all'); setFilterEth([]);
    setFilterSkills([]); setFilterUnion([]); setFilterLoc([]);
    setAgeMin(18); setAgeMax(65); setRateMax(10000);
  }, []);

  const filteredTalent = useMemo(() => {
    let data = talent.filter(t => {
      if (search) {
        const q = search.toLowerCase();
        if (!t.name.toLowerCase().includes(q) && !t.skills.some(s => s.toLowerCase().includes(q))) return false;
      }
      if (t.age < ageMin || t.age > ageMax) return false;
      if (t.rate > rateMax) return false;
      if (filterAvail.length && !filterAvail.includes(t.status)) return false;
      if (filterGender !== 'all' && t.gender !== filterGender) return false;
      if (filterEth.length && !filterEth.includes(t.eth)) return false;
      if (filterSkills.length && !filterSkills.some(s => t.skills.includes(s))) return false;
      if (filterUnion.length && !filterUnion.includes(t.union)) return false;
      if (filterLoc.length && !filterLoc.includes(t.loc)) return false;
      return true;
    });
    if (sortBy === 'name')   data.sort((a,b) => a.name.localeCompare(b.name));
    if (sortBy === 'rating') data.sort((a,b) => b.rating - a.rating);
    if (sortBy === 'age')    data.sort((a,b) => a.age - b.age);
    if (sortBy === 'recent') data.sort((a,b) => b.id - a.id);
    return data;
  }, [talent, search, ageMin, ageMax, rateMax, filterAvail, filterGender, filterEth, filterSkills, filterUnion, filterLoc, sortBy]);

  const activeFilters = useMemo(() => {
    const tags = [];
    filterAvail.forEach(v => tags.push({ key: 'avail:'+v, label: v === 'available' ? 'Available' : v === 'hold' ? 'On Hold' : 'Booked', remove: () => setFilterAvail(p => p.filter(x => x !== v)) }));
    if (filterGender !== 'all') tags.push({ key: 'gender', label: filterGender.charAt(0).toUpperCase()+filterGender.slice(1), remove: () => setFilterGender('all') });
    filterEth.forEach(v => tags.push({ key: 'eth:'+v, label: v, remove: () => setFilterEth(p => p.filter(x => x !== v)) }));
    filterSkills.forEach(v => tags.push({ key: 'skill:'+v, label: v, remove: () => setFilterSkills(p => p.filter(x => x !== v)) }));
    filterUnion.forEach(v => tags.push({ key: 'union:'+v, label: UNION_LABELS[v] || v, remove: () => setFilterUnion(p => p.filter(x => x !== v)) }));
    filterLoc.forEach(v => tags.push({ key: 'loc:'+v, label: LOC_LABELS[v] || v, remove: () => setFilterLoc(p => p.filter(x => x !== v)) }));
    if (ageMin !== 18 || ageMax !== 65) tags.push({ key: 'age', label: `Age ${ageMin}–${ageMax}`, remove: () => { setAgeMin(18); setAgeMax(65); } });
    if (rateMax !== 10000) tags.push({ key: 'rate', label: `≤ $${rateMax.toLocaleString()}/day`, remove: () => setRateMax(10000) });
    return tags;
  }, [filterAvail, filterGender, filterEth, filterSkills, filterUnion, filterLoc, ageMin, ageMax, rateMax]);

  return (
    <AppContext.Provider value={{
      talent, filteredTalent, shortlist, toggleShortlist, addTalent, removeTalent,
      bulkImport, exportAll, dbReady,
      activeNav, setActiveNav, sidebarExpanded, setSidebarExpanded,
      viewMode, setViewMode, sortBy, setSortBy,
      search, setSearch, filterAvail, setFilterAvail, filterGender, setFilterGender,
      filterEth, setFilterEth, filterSkills, setFilterSkills, filterUnion, setFilterUnion,
      filterLoc, setFilterLoc, ageMin, setAgeMin, ageMax, setAgeMax,
      rateMax, setRateMax, clearFilters, activeFilters,
      talentModal, setTalentModal, showAddTalent, setShowAddTalent,
      showNewProject, setShowNewProject, toast, showToast,
    }}>
      {children}
    </AppContext.Provider>
  );
}

function useToggleArray(state, setState) {
  return useCallback((val) => {
    setState(prev => prev.includes(val) ? prev.filter(x => x !== val) : [...prev, val]);
  }, [setState]);
}

/* ═══════════════════════════════════════════════════════════
   FILTER PANEL COMPONENT
═══════════════════════════════════════════════════════════ */
function FilterPanel() {
  const {
    filterAvail, setFilterAvail, filterGender, setFilterGender,
    filterEth, setFilterEth, filterSkills, setFilterSkills,
    filterUnion, setFilterUnion, filterLoc, setFilterLoc,
    ageMin, setAgeMin, ageMax, setAgeMax, rateMax, setRateMax,
    clearFilters, activeFilters,
  } = useContext(AppContext);

  const toggleAvail = useToggleArray(filterAvail, setFilterAvail);
  const toggleEth   = useToggleArray(filterEth, setFilterEth);
  const toggleSkill = useToggleArray(filterSkills, setFilterSkills);
  const toggleUnion = useToggleArray(filterUnion, setFilterUnion);
  const toggleLoc   = useToggleArray(filterLoc, setFilterLoc);

  const Section = ({ title, children }) => (
    <div className="border-t border-slate-100 px-4 py-3.5">
      <p className="text-[10px] font-700 uppercase tracking-widest text-slate-400 mb-2.5">{title}</p>
      {children}
    </div>
  );

  const CheckRow = ({ label, count, checked, onChange }) => (
    <label className="flex items-center gap-2.5 cursor-pointer group py-0.5">
      <input type="checkbox" className="custom-cb" checked={checked} onChange={onChange} />
      <span className="text-[13px] text-slate-600 group-hover:text-slate-900 transition-colors flex-1">{label}</span>
      {count !== undefined && <span className="text-[11px] text-slate-400">{count}</span>}
    </label>
  );

  return (
    <aside className="w-60 flex-shrink-0 bg-white border-r border-slate-200 flex flex-col overflow-hidden h-full">
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 border-b border-slate-100 sticky top-0 bg-white z-10">
        <div className="flex items-center gap-2">
          <Icon name="filter" size={14} color="#0f172a" />
          <span className="text-sm font-700 text-slate-800">Filters</span>
        </div>
        {activeFilters.length > 0 && (
          <button onClick={clearFilters} className="text-xs text-navy-700 font-600 hover:underline transition-colors">
            Clear all ({activeFilters.length})
          </button>
        )}
      </div>

      <div className="overflow-y-auto flex-1">
        {/* Active filter tags */}
        {activeFilters.length > 0 && (
          <div className="px-4 py-3 border-b border-slate-100">
            <div className="flex flex-wrap gap-1.5">
              {activeFilters.map(f => (
                <button key={f.key} onClick={f.remove}
                  className="flex items-center gap-1 px-2 py-0.5 bg-navy-100 text-navy-800 rounded-full text-[11px] font-600 hover:bg-navy-200 transition-colors">
                  {f.label}
                  <Icon name="close" size={10} color="currentColor" />
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Availability */}
        <Section title="Availability">
          <div className="flex flex-col gap-1">
            <CheckRow label="Available Now" count={124} checked={filterAvail.includes('available')} onChange={() => toggleAvail('available')} />
            <CheckRow label="On Hold" count={38} checked={filterAvail.includes('hold')} onChange={() => toggleAvail('hold')} />
            <CheckRow label="Booked Out" count={19} checked={filterAvail.includes('busy')} onChange={() => toggleAvail('busy')} />
          </div>
        </Section>

        {/* Age Range */}
        <Section title="Age Range">
          <div className="space-y-3">
            <div className="flex justify-between text-xs font-600 text-navy-700 mb-1">
              <span>Min: {ageMin}</span>
              <span>Max: {ageMax}</span>
            </div>
            <div>
              <p className="text-[10px] text-slate-400 mb-1">Minimum Age</p>
              <input type="range" min={18} max={70} value={ageMin}
                onChange={e => setAgeMin(Math.min(+e.target.value, ageMax - 1))} />
            </div>
            <div>
              <p className="text-[10px] text-slate-400 mb-1">Maximum Age</p>
              <input type="range" min={18} max={70} value={ageMax}
                onChange={e => setAgeMax(Math.max(+e.target.value, ageMin + 1))} />
            </div>
          </div>
        </Section>

        {/* Gender */}
        <Section title="Gender">
          <div className="grid grid-cols-3 gap-1.5">
            {['all','female','male'].map(g => (
              <button key={g} onClick={() => setFilterGender(g)}
                className={`text-xs py-1.5 rounded-lg border font-600 transition-all capitalize
                  ${filterGender === g
                    ? 'bg-navy-50 border-navy-700 text-navy-900'
                    : 'border-slate-200 text-slate-500 hover:border-navy-300'}`}>
                {g === 'all' ? 'All' : g.charAt(0).toUpperCase()+g.slice(1)}
              </button>
            ))}

        </Section>

        {/* Ethnicity */}
        <Section title="Ethnicity">
          <div className="flex flex-col gap-1">
            {[['caucasian','Caucasian'],['hispanic','Hispanic / Latino'],['black','Black / African'],
              ['asian','Asian'],['southasian','South Asian'],['middleeastern','Middle Eastern']].map(([v,l]) => (
              <CheckRow key={v} label={l} checked={filterEth.includes(v)} onChange={() => toggleEth(v)} />
            ))}
          </div>
        </Section>

        {/* Skills */}
        <Section title="Skills & Specialties">
          <div className="flex flex-col gap-1">
            {[['Acting',89],['Dancing',54],['Singing',42],['Stunts',17],
              ['Voice-Over',31],['Commercial',66],['Runway',28],['Improv',22]].map(([s,c]) => (
              <CheckRow key={s} label={s} count={c} checked={filterSkills.includes(s)} onChange={() => toggleSkill(s)} />
            ))}
          </div>
        </Section>

        {/* Union */}
        <Section title="Union Status">
          <div className="flex flex-col gap-1">
            {[['sag','SAG-AFTRA',74],['afm','AFM',18],['equity','AEA (Equity)',29],['nonunion','Non-Union',60]].map(([v,l,c]) => (
              <CheckRow key={v} label={l} count={c} checked={filterUnion.includes(v)} onChange={() => toggleUnion(v)} />
            ))}
          </div>
        </Section>

        {/* Location */}

          <div className="flex flex-col gap-1">
            {[['la','Los Angeles',88],['nyc','New York',61],['chi','Chicago',23],['atl','Atlanta',19],['aus','Austin',14]].map(([v,l,c]) => (
              <CheckRow key={v} label={l} count={c} checked={filterLoc.includes(v)} onChange={() => toggleLoc(v)} />
            ))}
          </div>
        </Section>

        {/* Daily Rate */}
        <Section title="Max Daily Rate">
          <div>
            <div className="text-right text-xs font-700 text-navy-700 mb-1.5">
              Up to ${rateMax.toLocaleString()}
            </div>
            <input type="range" min={500} max={10000} step={100} value={rateMax}
              onChange={e => setRateMax(+e.target.value)} />
            <div className="flex justify-between text-[10px] text-slate-400 mt-1">
              <span>$500</span><span>$10,000</span>
            </div>
          </div>
        </Section>

        <div className="h-4" />
      </div>
    </aside>
  );
}

function StatsBar() {
  const { talent, filteredTalent, shortlist, setShowNewProject } = useContext(AppContext);
  const available = talent.filter(t => t.status === 'available').length;
  const onHold    = talent.filter(t => t.status === 'hold').length;
  const booked    = talent.filter(t => t.status === 'busy').length;
  const avgRating = (talent.reduce((s,t) => s + t.rating, 0) / talent.length).toFixed(1);

  const stats = [
    { label:'Total Talent', value: talent.length, icon:'users', color:'text-navy-700', bg:'bg-navy-50' },
    { label:'Available',    value: available,      icon:'checkCircle', color:'text-emerald-600', bg:'bg-emerald-50', dot:'bg-emerald-400' },
    { label:'On Hold',      value: onHold,         icon:'info',       color:'text-amber-600',   bg:'bg-amber-50',   dot:'bg-amber-400' },
    { label:'Booked Out',   value: booked,         icon:'lock',       color:'text-red-500',     bg:'bg-red-50',     dot:'bg-red-400' },
    { label:'Avg Rating',   value: avgRating,      icon:'starFill',   color:'text-purple-600',  bg:'bg-purple-50' },
  ];

  return (
    <div className="flex items-center gap-4 px-5 py-2.5 bg-white border-b border-slate-200 flex-shrink-0 overflow-x-auto">
      {stats.map((s, i) => (
        <React.Fragment key={s.label}>
          {i > 0 && <div className="w-px h-7 bg-slate-200 flex-shrink-0" />}
          <div className="flex items-center gap-2.5 flex-shrink-0">
            <div className={`w-8 h-8 rounded-lg ${s.bg} flex items-center justify-center`}>
              <Icon name={s.icon} size={15} color="currentColor" className={s.color} />
            </div>
            <div>
              <p className={`text-lg font-800 text-slate-800 leading-none`}>{s.value}</p>
              <p className="text-[10px] text-slate-400 mt-0.5 font-500">{s.label}</p>
            </div>
          </div>
        </React.Fragment>
      ))}

        className="flex-shrink-0 flex items-center gap-2 h-7 px-3 bg-navy-50 border border-navy-200 rounded-lg text-xs text-navy-700 font-600 hover:bg-navy-100 transition-colors">
        <Icon name="folder" size={12} color="#0f172a" />

function Toolbar() {
  const { filteredTalent, viewMode, setViewMode, sortBy, setSortBy, bulkImport, exportAll, showToast } = useContext(AppContext);
  return (
    <div className="flex items-center justify-between px-5 h-11 border-b border-slate-200 bg-white flex-shrink-0 gap-2">

        <span className="ml-1 text-xs text-slate-400 bg-slate-100 rounded-full px-2 py-0.5 flex-shrink-0">
          {filteredTalent.length} result{filteredTalent.length !== 1 ? 's' : ''}
        </span>
      </div>
      <div className="flex items-center gap-2">
        {/* Sort */}
        <div className="relative">
          <select value={sortBy} onChange={e => setSortBy(e.target.value)}
            className="h-7 pl-2.5 pr-7 text-xs bg-white border border-slate-200 rounded-lg text-slate-600 cursor-pointer focus:outline-none focus:border-navy-400 transition-colors">

            <option value="rating">Sort: Highest Rated</option>
            <option value="age">Sort: Age</option>
          </select>

            <Icon name="chevDown" size={11} color="#94a3b8" />
          </div>
        </div>

        {/* View toggle */}
        <div className="flex items-center border border-slate-200 rounded-lg overflow-hidden">
          <button onClick={() => setViewMode('grid')}
            className={`h-7 w-8 flex items-center justify-center transition-colors ${viewMode === 'grid' ? 'bg-navy-50 text-navy-700' : 'text-slate-400 hover:bg-slate-50'}`}>
            <Icon name="grid" size={13} color="currentColor" />
          </button>
          <button onClick={() => setViewMode('list')}
            className={`h-7 w-8 flex items-center justify-center border-l border-slate-200 transition-colors ${viewMode === 'list' ? 'bg-navy-50 text-navy-700' : 'text-slate-400 hover:bg-slate-50'}`}>
            <Icon name="listView" size={13} color="currentColor" />
          </button>
        </div>

        {/* Import */}
        <button onClick={() => {
          const input = document.createElement('input');
          input.type = 'file'; input.accept = '.json';
          input.onchange = async (e) => {
            const file = e.target.files[0]; if (!file) return;
            const text = await file.text();
            try {
              const data = JSON.parse(text);
              if (Array.isArray(data)) { await bulkImport(data); }
              else { showToast('Invalid JSON: must be an array', 'error'); }
            } catch(err) { showToast('Failed to parse JSON file', 'error'); }
          };
          input.click();

          <Icon name="download" size={12} color="currentColor" />
          Export
        </button>
      </div>
    </div>
  );
}

  const [errors, setErrors] = useState({});

  if (!showAddTalent) return null;

  const SKILLS_LIST = ['Acting','Dancing','Singing','Stunts','Voice-Over','Commercial','Runway','Improv'];

  const toggleSkill = (s) => setForm(p => ({ ...p, skills: p.skills.includes(s) ? p.skills.filter(x => x !== s) : [...p.skills, s] }));

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Name is required';
    if (!form.age || isNaN(form.age) || +form.age < 16 || +form.age > 80) e.age = 'Enter a valid age (16–80)';
    if (!form.rate || isNaN(form.rate)) e.rate = 'Enter a valid rate';
    if (form.skills.length === 0) e.skills = 'Select at least one skill';
    return e;
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    addTalent({ ...form, age: +form.age, rate: +form.rate, img: `https://ui-avatars.com/api/?name=${encodeURIComponent(form.name)}&background=e8eaff&color=1a237e&size=400&bold=true`, eth:'caucasian', eye:'brown' });
    setShowAddTalent(false);
    setForm({ name:'', age:'', gender:'female', loc:'la', union:'nonunion', status:'available', skills:[], rate:'' });
    setErrors({});
  };

  const Field = ({ label, error, children }) => (
    <div>
      <label className="block text-xs font-700 text-slate-600 mb-1.5">{label}</label>
      {children}
      {error && <p className="text-[11px] text-red-500 mt-1">{error}</p>}
    </div>
  );

  const inputCls = (err) => `w-full h-9 px-3 text-sm border rounded-lg outline-none transition-all focus:border-navy-400 focus:ring-2 focus:ring-navy-50 ${err ? 'border-red-300' : 'border-slate-200'}`;

  return (
    <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4"
      onClick={() => setShowAddTalent(false)}>
      <div className="modal-panel bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto"
        onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100">
          <div>
            <h2 className="text-base font-800 text-slate-900">Add New Talent</h2>
            <p className="text-xs text-slate-400 mt-0.5">Create a new talent profile in the database</p>
          </div>
          <button onClick={() => setShowAddTalent(false)}
            className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 transition-colors text-slate-400">
            <Icon name="close" size={16} color="currentColor" />
          </button>
        </div>

        <form onSubmit={handleSubmit} className="px-6 py-5 space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <Field label="Full Name *" error={errors.name}>
              <input className={inputCls(errors.name)} placeholder="e.g. Alex Rivera" value={form.name} onChange={e => setForm(p => ({ ...p, name: e.target.value }))} />
            </Field>
            <Field label="Age *" error={errors.age}>
              <input className={inputCls(errors.age)} type="number" min="16" max="80" placeholder="28" value={form.age} onChange={e => setForm(p => ({ ...p, age: e.target.value }))} />
            </Field>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <Field label="Gender">
              <div className="relative">
                <select className={inputCls()} value={form.gender} onChange={e => setForm(p => ({ ...p, gender: e.target.value }))}>
                  <option value="female">Female</option>
                  <option value="male">Male</option>
                  <option value="nonbinary">Non-binary</option>
                </select>
                <div className="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2"><Icon name="chevDown" size={12} color="#94a3b8" /></div>
              </div>
            </Field>
            <Field label="Location">
              <div className="relative">
                <select className={inputCls()} value={form.loc} onChange={e => setForm(p => ({ ...p, loc: e.target.value }))}>
                  {Object.entries(LOC_LABELS).map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                </select>
                <div className="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2"><Icon name="chevDown" size={12} color="#94a3b8" /></div>
              </div>
            </Field>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <Field label="Union Status">
              <div className="relative">
                <select className={inputCls()} value={form.union} onChange={e => setForm(p => ({ ...p, union: e.target.value }))}>
                  {Object.entries(UNION_LABELS).map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                </select>
                <div className="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2"><Icon name="chevDown" size={12} color="#94a3b8" /></div>
              </div>
            </Field>
            <Field label="Availability">
              <div className="relative">
                <select className={inputCls()} value={form.status} onChange={e => setForm(p => ({ ...p, status: e.target.value }))}>
                  <option value="available">Available Now</option>
                  <option value="hold">On Hold</option>
                  <option value="busy">Booked Out</option>
                </select>
                <div className="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2"><Icon name="chevDown" size={12} color="#94a3b8" /></div>
              </div>
            </Field>
          </div>

          <Field label="Daily Rate ($) *" error={errors.rate}>
            <input className={inputCls(errors.rate)} type="number" min="100" placeholder="2500" value={form.rate} onChange={e => setForm(p => ({ ...p, rate: e.target.value }))} />
          </Field>

          <Field label="Skills * (select all that apply)" error={errors.skills}>
            <div className="flex flex-wrap gap-2 mt-1">
              {SKILLS_LIST.map(s => (
                <button type="button" key={s} onClick={() => toggleSkill(s)}
                  className={`px-3 py-1.5 rounded-full text-xs font-600 border transition-all ${form.skills.includes(s) ? 'bg-navy-900 text-white border-navy-900' : 'border-slate-200 text-slate-500 hover:border-navy-300 hover:text-navy-700'}`}>
                  {s}
                </button>
              ))}
            </div>
          </Field>

          <div className="flex items-center gap-3 pt-2">
            <button type="button" onClick={() => setShowAddTalent(false)}
              className="flex-1 h-10 border border-slate-200 rounded-xl text-sm font-700 text-slate-600 hover:bg-slate-50 transition-colors">
              Cancel
            </button>
            <button type="submit"
              className="flex-1 h-10 bg-navy-900 hover:bg-navy-800 rounded-xl text-sm font-700 text-white transition-colors flex items-center justify-center gap-2">
              <Icon name="plus" size={15} color="white" />
              Add to Database
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   NEW PROJECT MODAL COMPONENT
═══════════════════════════════════════════════════════════ */
function NewProjectModal() {
  const { showNewProject, setShowNewProject, shortlist, talent, toggleShortlist, showToast } = useContext(AppContext);
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ title:'', type:'film', studio:'', description:'', deadline:'', rate:'' });
  const [errors, setErrors] = useState({});

  if (!showNewProject) return null;

  const shortlisted = talent.filter(t => shortlist.has(t.id));

  const validate = () => {
    const e = {};
    if (!form.title.trim()) e.title = 'Project title is required';
    if (!form.studio.trim()) e.studio = 'Studio / client is required';
    return e;
  };

  const handleCreate = () => {
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setStep(2);
  };

  const handleFinish = () => {
    showToast(`Project "${form.title}" created with ${shortlisted.length} talent!`);
    setShowNewProject(false);
    setStep(1);
    setForm({ title:'', type:'film', studio:'', description:'', deadline:'', rate:'' });
    setErrors({});
  };

  const inputCls = (err) => `w-full h-9 px-3 text-sm border rounded-lg outline-none transition-all focus:border-navy-400 focus:ring-2 focus:ring-navy-50 ${err ? 'border-red-300' : 'border-slate-200'}`;

  return (
    <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4"
      onClick={() => { setShowNewProject(false); setStep(1); }}>
      <div className="modal-panel bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto"
        onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 bg-navy-100 rounded-xl flex items-center justify-center">
              <Icon name="folder" size={18} color="#0f172a" />
            </div>
            <div>
              <h2 className="text-base font-800 text-slate-900">New Casting Project</h2>
              <div className="flex items-center gap-1.5 mt-0.5">
                {[1, 2].map(n => (
                  <div key={n} className={`h-1.5 rounded-full transition-all ${n === step ? 'w-6 bg-accent' : n < step ? 'w-3 bg-emerald-400' : 'w-3 bg-slate-200'}`} />
                ))}
                <span className="text-[10px] text-slate-400 ml-1">Step {step} of 2</span>
              </div>
            </div>
          </div>
          <button onClick={() => { setShowNewProject(false); setStep(1); }}
            className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 transition-colors text-slate-400">
            <Icon name="close" size={16} color="currentColor" />
          </button>
        </div>

        {/* Step 1: Project Details */}
        {step === 1 && (
          <div className="px-6 py-5 space-y-4">
            <p className="text-sm font-600 text-slate-500 -mt-1">Enter the casting call details</p>

            <div className="grid grid-cols-2 gap-4">
              <div className="col-span-2">
                <label className="block text-xs font-700 text-slate-600 mb-1.5">Project Title *</label>
                <input className={inputCls(errors.title)} placeholder="e.g. Horizon — Season 3 Lead Role"
                  value={form.title} onChange={e => setForm(p => ({ ...p, title: e.target.value }))} />
                {errors.title && <p className="text-[11px] text-red-500 mt-1">{errors.title}</p>}
              </div>

              <div>
                <label className="block text-xs font-700 text-slate-600 mb-1.5">Production Type</label>
                <div className="relative">
                  <select className={inputCls()} value={form.type} onChange={e => setForm(p => ({ ...p, type: e.target.value }))}>
                    {[['film','Feature Film'],['tv','TV Series'],['commercial','Commercial'],['stage','Stage / Theater'],['voiceover','Voice-Over'],['print','Print / Editorial']].map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                  </select>
                  <div className="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2"><Icon name="chevDown" size={12} color="#94a3b8" /></div>
                </div>
              </div>

              <div>
                <label className="block text-xs font-700 text-slate-600 mb-1.5">Studio / Client *</label>
                <input className={inputCls(errors.studio)} placeholder="e.g. Netflix, BBDO, Paramount"
                  value={form.studio} onChange={e => setForm(p => ({ ...p, studio: e.target.value }))} />
                {errors.studio && <p className="text-[11px] text-red-500 mt-1">{errors.studio}</p>}
              </div>

              <div>
                <label className="block text-xs font-700 text-slate-600 mb-1.5">Submission Deadline</label>
                <input className={inputCls()} type="date" value={form.deadline}
                  onChange={e => setForm(p => ({ ...p, deadline: e.target.value }))} />
              </div>

              <div>
                <label className="block text-xs font-700 text-slate-600 mb-1.5">Offered Day Rate ($)</label>
                <input className={inputCls()} type="number" placeholder="3500"
                  value={form.rate} onChange={e => setForm(p => ({ ...p, rate: e.target.value }))} />
              </div>

              <div className="col-span-2">
                <label className="block text-xs font-700 text-slate-600 mb-1.5">Role Description</label>
                <textarea className={`${inputCls()} h-20 py-2 resize-none`}
                  placeholder="Describe the role requirements, physical type, skills needed…"
                  value={form.description} onChange={e => setForm(p => ({ ...p, description: e.target.value }))} />
              </div>
            </div>

            <div className="flex items-center gap-3 pt-2">
              <button onClick={() => { setShowNewProject(false); setStep(1); }}
                className="flex-1 h-10 border border-slate-200 rounded-xl text-sm font-700 text-slate-600 hover:bg-slate-50 transition-colors">
                Cancel
              </button>
              <button onClick={handleCreate}
                className="flex-1 h-10 bg-navy-900 hover:bg-navy-800 rounded-xl text-sm font-700 text-white transition-colors flex items-center justify-center gap-2">
                Next: Review Shortlist
                <Icon name="chevRight" size={15} color="white" />
              </button>
            </div>
          </div>
        )}

        {/* Step 2: Shortlist Review */}
        {step === 2 && (
          <div className="px-6 py-5">
            <div className="flex items-start justify-between mb-4">
              <div>
                <p className="text-sm font-600 text-slate-500">Shortlisted talent for</p>
                <p className="font-800 text-slate-900">{form.title}</p>
                <p className="text-xs text-slate-400">{form.studio}</p>
              </div>
              <span className="bg-navy-50 text-navy-700 text-sm font-700 px-3 py-1 rounded-full border border-navy-200">
                {shortlisted.length} talent
              </span>
            </div>

            {shortlisted.length === 0 ? (
              <div className="text-center py-12 bg-slate-50 rounded-xl">
                <Icon name="starFill" size={32} color="#e2e8f0" />
                <p className="text-sm font-600 text-slate-400 mt-3">No talent shortlisted yet</p>
                <p className="text-xs text-slate-400 mt-1">Go back to the dashboard and click the ★ icon on talent cards</p>
                <button onClick={() => setStep(1)}
                  className="mt-3 text-xs text-navy-700 font-700 hover:underline">
                  ← Back to project details
                </button>
              </div>
            ) : (
              <div className="space-y-2 max-h-72 overflow-y-auto pr-1">
                {shortlisted.map(t => (
                  <div key={t.id} className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <img src={t.img} alt={t.name}
                      className="w-10 h-10 rounded-xl object-cover object-top flex-shrink-0"
                      onError={e => { e.target.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(t.name)}&background=e8eaff&color=1a237e&size=80&bold=true`; }} />
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-700 text-slate-800">{t.name}</p>
                      <p className="text-[11px] text-slate-400">{t.age} yrs • {LOC_LABELS[t.loc]} • {UNION_LABELS[t.union]}</p>
                    </div>
                    <StatusBadge status={t.status} />
                    <StarRating rating={t.rating} />
                    <button onClick={() => toggleShortlist(t.id)}
                      className="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-500 transition-colors flex-shrink-0"
                      title="Remove from shortlist">
                      <Icon name="trash" size={14} color="currentColor" />
                    </button>
                  </div>
                ))}
              </div>
            )}

            <div className="flex items-center gap-3 pt-5 border-t border-slate-100 mt-4">
              <button onClick={() => setStep(1)}
                className="flex items-center gap-1.5 h-10 px-5 border border-slate-200 rounded-xl text-sm font-700 text-slate-600 hover:bg-slate-50 transition-colors">
                ← Back
              </button>
              <button onClick={handleFinish}
                className="flex-1 h-10 bg-navy-900 hover:bg-navy-800 rounded-xl text-sm font-700 text-white transition-colors flex items-center justify-center gap-2">
                <Icon name="checkCircle" size={15} color="white" />
                Create Project &amp; Submit
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   TOAST COMPONENT
═══════════════════════════════════════════════════════════ */
function Toast() {
  const { toast } = useContext(AppContext);
  if (!toast) return null;
  return (
    <div className="fixed bottom-6 right-6 z-[100] flex items-center gap-3 bg-slate-900 text-white pl-4 pr-5 py-3 rounded-xl shadow-2xl text-sm font-600 max-w-sm"
      style={{ animation: 'slideUp .2s cubic-bezier(.4,0,.2,1)' }}>
      <div className="w-6 h-6 bg-emerald-500 rounded-full flex items-center justify-center flex-shrink-0">
        <Icon name="checkCircle" size={14} color="white" />
      </div>
      {toast.msg}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
function App() {
  return (
    <AppProvider>
      <div className="h-screen flex flex-col overflow-hidden bg-slate-50" style={{ fontFamily:"'Inter',sans-serif" }}>
        <TopBar />
        <div className="flex flex-1 overflow-hidden">
          <Sidebar />
          <div className="flex flex-1 overflow-hidden">
            <FilterPanel />
            <main className="flex flex-col flex-1 overflow-hidden">
              <StatsBar />
              <Toolbar />
              <div className="flex-1 overflow-y-auto">
                <TalentGrid />
              </div>
            </main>
          </div>
        </div>

        {/* Modals */}
        <TalentDetailModal />
        <AddTalentModal />
        <NewProjectModal />
        <Toast />
      </div>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
